name: Daily MSC Literature Collection

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'

  workflow_dispatch:
    inputs:
      days_back:
        description: '回溯天数'
        required: false
        default: '30'
      max_results:
        description: '最大文献数'
        required: false
        default: '10'

permissions:
  contents: read

jobs:
  collect-and-send:
    name: 收集文献并发送邮件
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run literature collector
        env:
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back || '30' }}"
          MAX_RESULTS="${{ github.event.inputs.max_results || '10' }}"
          
          echo "========================================="
          echo "MSC 文献收集任务开始"
          echo "回溯天数: $DAYS_BACK"
          echo "目标数量: $MAX_RESULTS"
          echo "========================================="
          
          python main.py \
            --days-back "$DAYS_BACK" \
            --max-results "$MAX_RESULTS"

      - name: Upload sent record as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sent-pmids-record
          path: sent_pmids.txt
          retention-days: 90

      - name: Commit sent record
        if: success()
        run: |
          git config user.name "MSC Bot"
          git config user.email "bot@example.com"
          git add sent_pmids.txt || true
          git diff --cached --quiet || git commit -m "chore: update sent PMIDs record $(date +'%Y-%m-%d')"
          git push || true
